services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - ./local-jobs:/data/jobs
      - ./skills:/app/skills:ro
    env_file: .env
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    volumes:
      - ./skills:/app/skills:ro
    env_file: .env
    environment:
      - PAI_RUNNER_URL=http://api:8080
      - SKILLS_DIR=/app/skills
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
